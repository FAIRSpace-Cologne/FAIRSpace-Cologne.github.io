<!DOCTYPE html>
<html>

<head>
    <title>Test with Long Delay</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        #log {
            margin-top: 20px;
        }

        .entry {
            padding: 8px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <h1>Test with 2 Second Delay</h1>
    <div id="log"></div>
    <div id="content"></div>

    <script src="marked.min.js"></script>
    <script src="markdown-loader.js"></script>

    <script>
        const log = document.getElementById('log');
        function log_msg(msg) {
            const e = document.createElement('div');
            e.className = 'entry';
            e.innerText = new Date().toISOString().split('T')[1] + ' - ' + msg;
            log.appendChild(e);
            console.log(msg);
        }

        log_msg('Page loaded');

        setTimeout(() => {
            log_msg('Checking at 2000ms...');
            log_msg('typeof marked = ' + typeof marked);
            log_msg('typeof window.loadMarkdownContent = ' + typeof window.loadMarkdownContent);

            if (typeof window.loadMarkdownContent === 'function') {
                log_msg('Function IS available! Calling loadMarkdownContent("test.md")...');
                window.loadMarkdownContent('test.md', '#content').then(() => {
                    log_msg('SUCCESS: loadMarkdownContent completed');
                }).catch(e => {
                    log_msg('ERROR: ' + e.message);
                });
            } else {
                log_msg('ERROR: Function not available');
            }
        }, 2000);
    </script>
</body>

</html>
