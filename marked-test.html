<!DOCTYPE html>
<html>

<head>
    <title>Marked.js Test</title>
</head>

<body>
    <h1>Marked.js Library Test</h1>
    <div id="output">Waiting...</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        console.log('Test script executing');
        console.log('typeof marked:', typeof marked);

        if (typeof marked !== 'undefined') {
            console.log('marked is available');
            const testMarkdown = `# Hello\n\nThis is a test\n\n## Subheading\n\nMore content`;
            const html = marked.parse(testMarkdown);
            console.log('Parsed HTML:', html);
            document.getElementById('output').innerHTML = html;
        } else {
            console.error('marked is NOT available!');
            document.getElementById('output').innerHTML = '<p style="color: red;">marked.js failed to load!</p>';
        }
    </script>
</body>

</html>
